<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Love Project</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:black;
}

/* pages */
.page{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}
.active{display:flex;}

/* button */
.swipe{
  padding:12px 25px;
  background:#ff4d88;
  color:white;
  border-radius:30px;
  cursor:pointer;
}

/* login */
.form{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.form-content{
  padding:10px;
  border-radius:10px;
  border:none;
}
#errorMsg{
  color:red;
  display:none;
}

/* scanner */
.scanner{
  width:300px;
  height:400px;
  border:2px solid #00ffcc;
  border-radius:15px;
  overflow:hidden;
  position:relative;
}
video{width:100%;height:100%;object-fit:cover;}
.scan-line{
  position:absolute;
  width:100%;
  height:3px;
  background:#00ffcc;
  animation:scan 2s infinite;
}
@keyframes scan{
  0%{top:0;}100%{top:100%;}
}

/* loader */
.loader .text{
  color:#00ffcc;
  animation:fade 2s infinite;
}
@keyframes fade{
  0%{opacity:0;}50%{opacity:1;}100%{opacity:0;}
}

/* envelope */
.envelope-container{
  display:flex;
  gap:15px;
  flex-wrap:wrap;
  justify-content:center;
}
.letter{
  width:120px;
  height:150px;
  background:white;
  overflow:hidden;
  transition:0.5s;
}
.photo{
  width:100%;
  height:100%;
  object-fit:cover;
}
.open .letter{
  transform:translateY(-100px);
}

/* final card */
.card-inner{
  width:300px;
  height:200px;
  background:black;
  position:relative;
  overflow:hidden;
}
.card-content{
  background:white;
  height:100%;
  padding:20px;
  text-align:center;
  transition:0.7s;
}
.card-inner:hover .card-content{
  transform:translateY(-120px);
}
</style>
</head>

<body>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" src="song.mp3" autoplay loop></audio>

<!-- PAGE 1 -->
<div id="page1" class="page active">
  <div class="swipe" onclick="startApp()">Get Started</div>
</div>

<!-- PAGE 2 LOGIN -->
<div id="page2" class="page">
  <form class="form" onsubmit="goScanner(event)">
    <input class="form-content" placeholder="Username">
    <input class="form-content" type="password" placeholder="Password">
    <button>Continue</button>
    <p id="errorMsg">Wrong Password ❌</p>
  </form>
</div>

<!-- PAGE 3 SCANNER -->
<div id="page3" class="page">
  <button onclick="startCamera()">Start Scanning</button>

  <div id="scannerBox" style="display:none;">
    <div class="scanner">
      <video id="camera" autoplay></video>
      <div class="scan-line"></div>
    </div>
    <p id="scanStatus" style="color:white;">Scanning...</p>
  </div>
</div>

<!-- PAGE 4 LOADER -->
<div id="page4" class="page">
  <div class="loader">
    <div class="text">Loading...</div>
  </div>
</div>

<!-- PAGE 5 ENVELOPE -->
<div id="page5" class="page">

<div class="envelope-container">
  <div onclick="openLetter(this)"><div class="letter"><img src="img1.jpg" class="photo"></div></div>
  <div onclick="openLetter(this)"><div class="letter"><img src="img2.jpg" class="photo"></div></div>
  <div onclick="openLetter(this)"><div class="letter"><img src="img3.jpg" class="photo"></div></div>
  <div onclick="openLetter(this)"><div class="letter"><img src="img4.jpg" class="photo"></div></div>
  <div onclick="openLetter(this)"><div class="letter"><img src="img5.jpg" class="photo"></div></div>
</div>

<button onclick="goFinal()">></button>

</div>

<!-- PAGE 6 FINAL -->
<div id="page6" class="page">

<div class="card-inner">
  <div class="card-content">
    <h2 style="color:#ff4d88;">For You ❤️</h2>
    <p>
      Tumi amar life er shobcheye special 💖  
      Tomar sathe thaka protita moment amar jonno priceless 😌  
      Ami tomake onek bhalobashi ❤️
    </p>
    <p>– Yours Joni 💌</p>
  </div>
</div>

</div>

<script>
function startApp(){
  bgMusic.play().catch(()=>{});
  page1.classList.remove("active");
  page2.classList.add("active");
}

function goScanner(e){
  e.preventDefault();
  let pass=document.querySelectorAll(".form-content")[1].value;

  if(pass==="Sannu"){
    errorMsg.style.display="none";
    page2.classList.remove("active");
    page3.classList.add("active");
  }else{
    errorMsg.style.display="block";
  }
}

function startCamera(){
  navigator.mediaDevices.getUserMedia({video:true})
  .then(stream=>{
    camera.srcObject=stream;
    scannerBox.style.display="block";

    setTimeout(()=>{
      scanStatus.innerText="Scanning Done ✅";

      setTimeout(()=>{
        page3.classList.remove("active");
        page4.classList.add("active");

        setTimeout(()=>{
          page4.classList.remove("active");
          page5.classList.add("active");
        },4000);

      },1000);

    },3000);
  });
}

function openLetter(el){
  el.classList.toggle("open");
}

function goFinal(){
  page5.classList.remove("active");
  page6.classList.add("active");
}
</script>

</body>
</html>
